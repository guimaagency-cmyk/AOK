<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Bibliothèque — Alpha Omega Key</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:    #0C1628;
      --gold:  #C4A35A;
      --ivory: #F5F0E9;
      --iv50:  rgba(245,240,233,.5);
      --iv08:  rgba(245,240,233,.08);
      --gd35:  rgba(196,163,90,.35);
      --gd18:  rgba(196,163,90,.18);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--ivory);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: none;
    }

    /* ── CURSOR ── */
    #cur, #ring {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%,-50%);
      z-index: 9999;
    }
    #cur  { width:7px; height:7px; background:var(--gold); mix-blend-mode:screen; transition:width .3s,height .3s; }
    #ring { width:28px; height:28px; border:1px solid var(--gd35); z-index:9998; }

    /* ── GRAIN ── */
    .grain {
      position:fixed; inset:-200%; width:400%; height:400%;
      pointer-events:none; z-index:800; opacity:.024;
      animation: grain .8s steps(1) infinite;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size:256px;
    }
    @keyframes grain {
      0%{transform:translate(0,0)} 10%{transform:translate(-5%,-10%)} 20%{transform:translate(-15%,5%)}
      30%{transform:translate(7%,-25%)} 40%{transform:translate(-5%,25%)} 50%{transform:translate(-15%,10%)}
      60%{transform:translate(15%,0)} 70%{transform:translate(0,15%)} 80%{transform:translate(3%,35%)} 90%{transform:translate(-10%,10%)}
    }

    /* ── ORBS ── */
    .orb {
      position:fixed; border-radius:50%; filter:blur(90px);
      pointer-events:none; animation:fl linear infinite;
    }
    .o1{width:520px;height:520px;top:-12%;left:-10%;animation-duration:22s;
        background:radial-gradient(circle,rgba(27,53,101,.42) 0%,transparent 70%);}
    .o2{width:300px;height:300px;bottom:-8%;right:-6%;animation-duration:18s;animation-direction:reverse;
        background:radial-gradient(circle,rgba(196,163,90,.08) 0%,transparent 70%);}
    .o3{width:200px;height:200px;top:30%;right:10%;animation-duration:28s;
        background:radial-gradient(circle,rgba(27,53,101,.16) 0%,transparent 70%);}
    @keyframes fl{
      0%,100%{transform:translate(0,0) scale(1)}
      33%{transform:translate(16px,-12px) scale(1.04)}
      66%{transform:translate(-12px,16px) scale(.96)}
    }

    /* ── FIXED CORNERS ── */
    .logo {
      position:fixed; top:2rem; left:2.5rem; z-index:100;
      font-size:10px; font-weight:500; letter-spacing:4px; text-transform:uppercase;
      color:rgba(245,240,233,.3);
      opacity:0; animation:fi .8s ease 2s forwards;
    }
    .dt {
      position:fixed; bottom:2rem; right:2.5rem; z-index:100;
      font-size:9px; letter-spacing:3px; text-transform:uppercase;
      color:rgba(245,240,233,.16);
      opacity:0; animation:fi .8s ease 3.4s forwards;
    }

    /* ── FAINT HORIZONTAL RULES ── */
    .hr { position:fixed; left:0; right:0; height:1px; background:var(--iv08); pointer-events:none; }
    .hr1{top:28%;} .hr2{top:72%;}

    /* ══════════════════════════
       STAGE
    ══════════════════════════ */
    .stage {
      position:relative; z-index:10;
      display:flex; flex-direction:column;
      align-items:center; text-align:center;
      padding:2rem 1.5rem; gap:0;
    }

    /* ══════════════════════════
       SEAL — pure SVG, no textPath
    ══════════════════════════ */
    .seal-wrap {
      width:200px; height:200px;
      margin-bottom:2.6rem;
      opacity:0; animation:fi .5s ease .5s forwards;
    }
    .seal-svg { width:100%; height:100%; overflow:visible; }

    /* Rings */
    .r1 { fill:none; stroke:var(--gold); stroke-width:.9; opacity:.55;
          stroke-dasharray:565; stroke-dashoffset:565;
          animation:draw 1.9s cubic-bezier(.16,1,.3,1) .8s forwards; }
    .r2 { fill:none; stroke:var(--gd18); stroke-width:.6;
          stroke-dasharray:502; stroke-dashoffset:502;
          animation:draw 2.1s cubic-bezier(.16,1,.3,1) .9s forwards; }
    .r3 { fill:none; stroke:var(--gd18); stroke-width:.4; opacity:.6;
          stroke-dasharray:10 6; }

    @keyframes draw { to{stroke-dashoffset:0} }

    /* Tick marks */
    .tk { stroke:rgba(196,163,90,.45); stroke-width:.8;
          stroke-dasharray:12; stroke-dashoffset:12;
          animation:draw .5s ease 1.6s forwards; }
    .tks { stroke:rgba(196,163,90,.25); stroke-width:.6;
           stroke-dasharray:7; stroke-dashoffset:7;
           animation:draw .5s ease 1.7s forwards; }

    /* Cross lines */
    .cl { stroke:rgba(196,163,90,.2); stroke-width:.5;
          stroke-dasharray:44; stroke-dashoffset:44; }
    .clh { animation:draw .6s ease 1.5s forwards; }
    .clv { animation:draw .6s ease 1.6s forwards; }

    /* Dots */
    .cd { fill:rgba(196,163,90,.5); opacity:0; animation:fi .5s ease 2s forwards; }

    /* Center labels (SVG text, no textPath) */
    .st1 {
      font-family:'DM Sans',sans-serif; font-size:7.5px;
      fill:rgba(196,163,90,.6); text-anchor:middle; letter-spacing:3px;
      opacity:0; animation:fi .7s ease 2.1s forwards;
    }
    .st2 {
      font-family:'Cormorant Garamond',serif; font-size:28px; font-weight:300;
      fill:var(--gold); text-anchor:middle; dominant-baseline:central;
      letter-spacing:4px; font-style:italic;
      opacity:0; animation:fi .9s ease 2s forwards;
    }
    .sdiv { stroke:rgba(196,163,90,.3); stroke-width:.5; opacity:0; animation:fi .5s ease 2.1s forwards; }

    /* ══════════════════════════
       EYEBROW
    ══════════════════════════ */
    .eyebrow {
      display:flex; align-items:center; gap:.9rem;
      font-size:9px; font-weight:500; letter-spacing:3.5px; text-transform:uppercase;
      color:var(--gold); margin-bottom:1.4rem;
      opacity:0; animation:fu .8s ease 2.3s forwards;
    }
    .el { width:24px; height:1px; background:var(--gold); opacity:.5; display:block; }

    /* ══════════════════════════
       TITLE
    ══════════════════════════ */
    .title {
      font-family:'Cormorant Garamond',serif;
      font-size:clamp(2.2rem,5vw,3.8rem);
      font-weight:300; font-style:italic;
      line-height:1.14; letter-spacing:-.02em;
      color:var(--ivory); margin-bottom:1.8rem;
    }
    .tl { display:block; overflow:hidden; }
    .tw {
      display:inline-block;
      opacity:0; transform:translateY(38px);
      animation:wu .9s cubic-bezier(.16,1,.3,1) forwards;
    }
    .tl:nth-child(1) .tw               { animation-delay:2.4s; }
    .tl:nth-child(2) .tw               { animation-delay:2.54s; }
    .tl:nth-child(3) .tw:nth-child(1)  { animation-delay:2.66s; }
    .tl:nth-child(3) .tw:nth-child(2)  { animation-delay:2.72s; }
    .tg { color:var(--gold); }

    /* ══════════════════════════
       SUBTITLE
    ══════════════════════════ */
    .sub {
      font-size:13px; font-weight:300; color:var(--iv50);
      line-height:1.8; max-width:360px; margin-bottom:3rem;
      opacity:0; animation:fu .8s ease 3s forwards;
    }

    /* ══════════════════════════
       BUTTON
    ══════════════════════════ */
    .btn-w { opacity:0; animation:fu .8s ease 3.2s forwards; }

    .btn {
      position:relative; display:inline-block;
      padding:1.1rem 3.2rem;
      border:1px solid var(--gd35); color:var(--gold);
      font-family:'DM Sans',sans-serif; font-size:10px;
      font-weight:500; letter-spacing:3px; text-transform:uppercase;
      text-decoration:none; cursor:none; overflow:hidden;
      transition:color .35s, border-color .35s;
    }
    .btn::before {
      content:''; position:absolute; inset:0;
      background:var(--gold);
      transform:translateX(-101%);
      transition:transform .4s cubic-bezier(.16,1,.3,1);
    }
    .btn:hover { color:var(--bg); border-color:var(--gold); }
    .btn:hover::before { transform:translateX(0); }
    .btn span { position:relative; z-index:1; }

    .note {
      margin-top:1rem; font-size:10px; font-weight:300;
      color:rgba(245,240,233,.18); letter-spacing:1.5px;
      opacity:0; animation:fi .8s ease 3.5s forwards;
    }

    /* ══════════════════════════
       KEYFRAMES
    ══════════════════════════ */
    @keyframes fi  { from{opacity:0}                       to{opacity:1} }
    @keyframes fu  { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:none} }
    @keyframes wu  { to{opacity:1;transform:none} }

    /* ══════════════════════════
       RESPONSIVE
    ══════════════════════════ */
    @media(max-width:600px){
      body { cursor:auto; }
      #cur,#ring { display:none; }
      .seal-wrap { width:150px; height:150px; }
      .title { font-size:2rem; }
      .sub { font-size:12px; }
      .btn { padding:.9rem 2rem; }
      .logo { top:1.2rem; left:1.5rem; }
      .dt   { bottom:1.2rem; right:1.5rem; }
      .hr   { display:none; }
    }
    @media(prefers-reduced-motion:reduce){
      *,*::before,*::after {
        animation-duration:.01ms !important;
        animation-delay:0ms !important;
      }
    }
  </style>
</head>
<body>

<div id="cur"></div>
<div id="ring"></div>
<div class="grain"></div>
<div class="orb o1"></div>
<div class="orb o2"></div>
<div class="orb o3"></div>
<div class="hr hr1"></div>
<div class="hr hr2"></div>
<div class="logo">A &middot; O &middot; K</div>
<div class="dt">Juillet 2026</div>

<main class="stage">

  <!-- SEAL SVG — no textPath, no defs path reference -->
  <div class="seal-wrap">
    <svg class="seal-svg" viewBox="-110 -110 220 220" xmlns="http://www.w3.org/2000/svg">

      <!-- Dashed inner decorative ring -->
      <circle class="r3" cx="0" cy="0" r="72"/>

      <!-- Animated rings -->
      <circle class="r2" cx="0" cy="0" r="80"/>
      <circle class="r1" cx="0" cy="0" r="90"/>

      <!-- Cardinal tick marks (long) -->
      <line class="tk" x1="0" y1="-86" x2="0" y2="-76"/>
      <line class="tk" x1="0"  y1="76"  x2="0"  y2="86"/>
      <line class="tk" x1="-86" y1="0" x2="-76" y2="0"/>
      <line class="tk" x1="76"  y1="0"  x2="86"  y2="0"/>

      <!-- 45-degree tick marks (short) -->
      <line class="tks" x1="-62" y1="-62" x2="-55" y2="-55"/>
      <line class="tks" x1="55"  y1="-55" x2="62"  y2="-62"/>
      <line class="tks" x1="-62" y1="62"  x2="-55" y2="55"/>
      <line class="tks" x1="55"  y1="55"  x2="62"  y2="62"/>

      <!-- Cardinal dots -->
      <circle class="cd" cx="0"   cy="-90" r="2.8"/>
      <circle class="cd" cx="90"  cy="0"   r="2.8"/>
      <circle class="cd" cx="0"   cy="90"  r="2.8"/>
      <circle class="cd" cx="-90" cy="0"   r="2.8"/>

      <!-- Cross lines -->
      <line class="cl clh" x1="-40" y1="0" x2="40" y2="0"/>
      <line class="cl clv" x1="0" y1="-40" x2="0" y2="40"/>

      <!-- Center: label above -->
      <text class="st1" x="0" y="-14">A &middot; O &middot; K</text>

      <!-- Divider line -->
      <line class="sdiv" x1="-24" y1="-5" x2="24" y2="-5"/>

      <!-- Center: alpha omega -->
      <text class="st2" x="0" y="14">&#945; &middot; &#937;</text>

    </svg>
  </div>

  <!-- EYEBROW -->
  <div class="eyebrow">
    <span class="el"></span>
    Acc&egrave;s biblioth&egrave;que confirm&eacute;
    <span class="el"></span>
  </div>

  <!-- TITLE -->
  <h1 class="title">
    <span class="tl"><span class="tw">Les&nbsp;portes&nbsp;de&nbsp;la</span></span>
    <span class="tl"><span class="tw"><em class="tg">Biblioth&egrave;que&nbsp;AOK</em></span></span>
    <span class="tl"><span class="tw">sont&nbsp;</span><span class="tw">ouvertes.</span></span>
  </h1>

  <!-- SUBTITLE -->
  <p class="sub">
    Vos guides scientifiques vous attendent.<br>
    T&eacute;l&eacute;chargez ce qui vous concerne, librement.
  </p>

  <!-- BUTTON -->
  <div class="btn-w">
    <a href="URL_BIBLIOTHEQUE" class="btn">
      <span>Entrer dans la biblioth&egrave;que</span>
    </a>
    <p class="note">Acc&egrave;s gratuit &middot; Aucune limite de t&eacute;l&eacute;chargement</p>
  </div>

</main>

<script>
  /* CURSOR */
  const cur  = document.getElementById('cur');
  const ring = document.getElementById('ring');
  let rx = window.innerWidth/2, ry = window.innerHeight/2;
  let mx = rx, my = ry;

  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    cur.style.left = mx + 'px';
    cur.style.top  = my + 'px';
  });

  (function loop() {
    rx += (mx - rx) * .1;
    ry += (my - ry) * .1;
    ring.style.left = rx + 'px';
    ring.style.top  = ry + 'px';
    requestAnimationFrame(loop);
  })();

  document.querySelectorAll('a').forEach(a => {
    a.addEventListener('mouseenter', () => {
      cur.style.width = cur.style.height = '13px';
      ring.style.width = ring.style.height = '40px';
    });
    a.addEventListener('mouseleave', () => {
      cur.style.width = cur.style.height = '7px';
      ring.style.width = ring.style.height = '28px';
    });
  });
</script>
</body>
</html>
